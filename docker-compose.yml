services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8008:8000"
    env_file:
      - .env
    volumes:
      - sqlite-data:/app/data
      - milvus-lite-data:/app/milvus_data
      - uploads-data:/app/data/uploads
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - sqlite-data:/app/data
      - milvus-lite-data:/app/milvus_data
      - uploads-data:/app/data/uploads
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis-data:
  sqlite-data:
  milvus-lite-data:
  uploads-data:
